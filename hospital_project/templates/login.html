{% extends 'base.html' %}
{% block title %}Login — MediCare{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-card">
        <div class="auth-header text-center mb-4">
            <div class="auth-icon mb-3">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h3 class="auth-title">Welcome Back</h3>
            <p class="auth-subtitle">Login to your MediCare account</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-500">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0">
                        <i class="fas fa-user text-primary"></i>
                    </span>
                    {{ form.username }}
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-500">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0">
                        <i class="fas fa-lock text-primary"></i>
                    </span>
                    {{ form.password }}
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
            <p class="text-center text-light mb-0">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-primary fw-600">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
